<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="kyber-vault lattice mark">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1621"/>
      <stop offset="1" stop-color="#13261f"/>
    </linearGradient>
    <linearGradient id="vec" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#45a4ff"/>
      <stop offset="1" stop-color="#4de6b2"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="url(#bg)" stroke="#2f3f58"/>
  <!-- lattice points: a regular grid representing the LWE/lattice structure -->
  <g fill="#8da3c3">
    <circle cx="8" cy="8" r="1.5"/>
    <circle cx="16" cy="8" r="1.5"/>
    <circle cx="24" cy="8" r="1.5"/>
    <circle cx="8" cy="16" r="1.5"/>
    <circle cx="24" cy="16" r="1.5"/>
    <circle cx="8" cy="24" r="1.5"/>
    <circle cx="16" cy="24" r="1.5"/>
    <circle cx="24" cy="24" r="1.5"/>
  </g>
  <!-- the "hard problem": shortest-vector path through the lattice -->
  <path d="M8 24 L16 16 L24 8" fill="none" stroke="url(#vec)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="16" cy="16" r="2.6" fill="#4de6b2"/>
</svg>
