name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - id: pages
        uses: actions/configure-pages@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demos/kyber-vault/package-lock.json

      - name: Install dependencies
        working-directory: demos/kyber-vault
        run: npm ci

      - name: Run tests
        working-directory: demos/kyber-vault
        run: npm test

      - name: Build
        working-directory: demos/kyber-vault
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Install Playwright browser
        working-directory: demos/kyber-vault
        run: npx playwright install --with-deps chromium

      - name: Accessibility gate (axe-core, WCAG A/AA)
        working-directory: demos/kyber-vault
        run: npm run test:a11y

      - uses: actions/upload-pages-artifact@v5
        with:
          path: demos/kyber-vault/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
